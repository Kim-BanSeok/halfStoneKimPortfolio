<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#07071A;--cyan:#00D4FF;--purple:#8B5CF6;--gold:#FFD700;}
body{background:var(--bg);color:#E0E0FF;font-family:'DM Mono',monospace;height:100dvh;overflow:hidden;display:flex;flex-direction:column;}
#topbar{display:flex;align-items:center;gap:1rem;padding:.55rem 1rem;border-bottom:1px solid #1E1E4A;flex-shrink:0;}
#topbar a{color:var(--cyan);text-decoration:none;font-size:.78rem;opacity:.7;transition:opacity .2s;}
#topbar a:hover{opacity:1;}

#cv-wrap{flex:1;position:relative;overflow:hidden;}
canvas{display:block;width:100%;height:100%;}
.overlay{position:absolute;inset:0;background:rgba(7,7,26,.96);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;}

.dtab:hover{border-color:var(--cyan);color:var(--cyan);}
.dtab.active{border-color:var(--cyan);color:var(--cyan);background:rgba(0,212,255,.07);}
.dtab[data-d="EASY"].active{border-color:#00FF88;color:#00FF88;background:rgba(0,255,136,.07);}
.dtab[data-d="HARD"].active{border-color:var(--purple);color:var(--purple);background:rgba(139,92,246,.07);}
.song-list{display:flex;flex-direction:column;gap:.5rem;width:min(360px,88vw);max-height:50vh;overflow-y:auto;padding-right:4px;}
.song-list::-webkit-scrollbar{width:3px;}
.song-list::-webkit-scrollbar-track{background:transparent;}
.song-list::-webkit-scrollbar-thumb{background:#2E2E5A;border-radius:2px;}
.song-card{border:1px solid #1E1E4A;border-radius:8px;padding:.75rem 1rem;cursor:pointer;display:flex;justify-content:space-between;align-items:center;background:#0D0D28;transition:border-color .2s,background .2s;flex-shrink:0;}

.song-name{font-size:.88rem;}

.d-easy{background:rgba(0,255,136,.1);color:#00FF88;}
.d-mid{background:rgba(0,212,255,.1);color:var(--cyan);}
.d-hard{background:rgba(139,92,246,.1);color:var(--purple);}
#hud{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;padding:.65rem 1rem;pointer-events:none;}
.hb{text-align:center;}
.hl{font-size:.58rem;color:#5858A0;letter-spacing:.1em;}
.hv{font-size:1.05rem;}

#prog-fill{height:100%;background:var(--cyan);width:0%;transition:width .12s linear;}

.err-banner{font-family:'DM Mono',monospace;font-size:.63rem;line-height:1.75;padding:.5rem .8rem;border-radius:4px;text-align:left;white-space:pre;letter-spacing:.03em;background:rgba(255,68,68,.06);border:1px solid rgba(255,68,68,.28);color:#FF4444;text-shadow:0 0 8px rgba(255,68,68,.35);}

.btn{border:1px solid var(--cyan);background:transparent;color:var(--cyan);font-family:'DM Mono',monospace;font-size:.82rem;letter-spacing:.15em;padding:.55rem 1.6rem;cursor:pointer;border-radius:4px;transition:background .2s,color .2s;}

#esc-hint{position:absolute;top:.55rem;right:.9rem;font-size:.58rem;color:#3A3A6A;letter-spacing:.08em;pointer-events:none;}
#scr-pause{gap:1.6rem;}

#mob-ctrl{position:absolute;top:.38rem;right:.45rem;display:flex;gap:.25rem;z-index:20;}
.mbt{background:rgba(7,7,26,.82);border:1px solid #2E2E5A;border-radius:3px;color:#5858A0;font-family:'DM Mono',monospace;font-size:.62rem;padding:.22rem .46rem;cursor:pointer;line-height:1;transition:border-color .15s,color .15s;-webkit-tap-highlight-color:transparent;}
.mbt:hover,.mbt:active{border-color:var(--cyan);color:var(--cyan);}

.mode-tabs{display:flex;gap:.4rem;}
.mtab{border:1px solid #2E2E5A;background:transparent;color:#5858A0;font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.08em;padding:.25rem .9rem;border-radius:3px;cursor:pointer;transition:all .18s;}
.mtab:hover{border-color:var(--cyan);color:var(--cyan);}
.mtab.active[data-m="arcade"]{border-color:var(--cyan);color:var(--cyan);background:rgba(0,212,255,.07);}

#mode-badge.arcade{background:rgba(0,212,255,.1);color:var(--cyan);border:1px solid rgba(0,212,255,.25);}

<script>
'use strict';

// ── AUDIO ──
let actx=null;
function ac(){
  if(!actx) actx=new(window.AudioContext||window.webkitAudioContext)();
  if(actx.state==='suspended') actx.resume();
  return actx;
}
let _noiseBuf=null;
function noiseBuf(){
  const a=ac();
  if(!_noiseBuf||_noiseBuf.sampleRate!==a.sampleRate){
    const sz=a.sampleRate*0.5,b=a.createBuffer(1,sz,a.sampleRate),d=b.getChannelData(0);
    for(let i=0;i<sz;i++) d[i]=Math.random()*2-1;
    _noiseBuf=b;
  }
  return _noiseBuf;
}
const MV=0.72;
function kick(t){try{const a=ac(),o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.frequency.setValueAtTime(160,t);o.frequency.exponentialRampToValueAtTime(38,t+0.13);g.gain.setValueAtTime(MV,t);g.gain.exponentialRampToValueAtTime(.001,t+0.28);o.start(t);o.stop(t+0.28);}catch(e){}}
function snare(t){try{const a=ac(),src=a.createBufferSource(),flt=a.createBiquadFilter(),g=a.createGain();src.buffer=noiseBuf();flt.type='bandpass';flt.frequency.value=2200;flt.Q.value=0.7;src.connect(flt);flt.connect(g);g.connect(a.destination);g.gain.setValueAtTime(MV*0.5,t);g.gain.exponentialRampToValueAtTime(.001,t+0.18);src.start(t);src.stop(t+0.18);const o2=a.createOscillator(),g2=a.createGain();o2.connect(g2);g2.connect(a.destination);o2.frequency.value=190;g2.gain.setValueAtTime(MV*0.12,t);g2.gain.exponentialRampToValueAtTime(.001,t+0.07);o2.start(t);o2.stop(t+0.07);}catch(e){}}
function hat(t,vol=0.1,dur=0.04){try{const a=ac(),src=a.createBufferSource(),flt=a.createBiquadFilter(),g=a.createGain();src.buffer=noiseBuf();flt.type='highpass';flt.frequency.value=9500;src.connect(flt);flt.connect(g);g.connect(a.destination);g.gain.setValueAtTime(vol*MV,t);g.gain.exponentialRampToValueAtTime(.001,t+dur);src.start(t);src.stop(t+dur);}catch(e){}}

// bass: wave=sawtooth, fcut controls brightness (300=boomy, 900=bright/aggressive)
function bass(t,freq,dur,fcut){try{const a=ac(),o=a.createOscillator(),flt=a.createBiquadFilter(),g=a.createGain();o.type='sawtooth';flt.type='lowpass';flt.frequency.value=fcut||500;o.connect(flt);flt.connect(g);g.connect(a.destination);o.frequency.value=freq;g.gain.setValueAtTime(MV*0.28,t);g.gain.exponentialRampToValueAtTime(.001,t+dur);o.start(t);o.stop(t+dur);}catch(e){}}

// lead: wave & fcut fully parameterized per song
function lead(t,freq,dur,vol,wave,fcut){try{const a=ac(),o=a.createOscillator(),flt=a.createBiquadFilter(),g=a.createGain();o.type=wave||'square';flt.type='lowpass';flt.frequency.value=fcut||1800;o.connect(flt);flt.connect(g);g.connect(a.destination);o.frequency.value=freq;g.gain.setValueAtTime((vol||0.08)*MV,t);g.gain.exponentialRampToValueAtTime(.001,t+dur);o.start(t);o.stop(t+dur);}catch(e){}}

// pluck: percussive bandpass triangle — bright & short
function pluck(t,freq){try{const a=ac(),o=a.createOscillator(),flt=a.createBiquadFilter(),g=a.createGain();o.type='triangle';flt.type='bandpass';flt.frequency.value=freq*2.2;flt.Q.value=10;o.connect(flt);flt.connect(g);g.connect(a.destination);o.frequency.value=freq;g.gain.setValueAtTime(MV*0.32,t);g.gain.exponentialRampToValueAtTime(.001,t+0.14);o.start(t);o.stop(t+0.14);}catch(e){}}

function sndHit(t,q){try{const a=ac(),o=a.createOscillator(),g=a.createGain();const f=q==='P'?1047:q==='G'?880:440;o.type='sine';o.frequency.setValueAtTime(f,t);o.frequency.exponentialRampToValueAtTime(f*0.7,t+0.07);g.gain.setValueAtTime(0.22,t);g.gain.exponentialRampToValueAtTime(.001,t+0.09);o.connect(g);g.connect(a.destination);o.start(t);o.stop(t+0.09);}catch(e){}}
function sndMiss(t){try{const a=ac(),o=a.createOscillator(),g=a.createGain();o.type='sawtooth';o.frequency.value=110;g.gain.setValueAtTime(0.1,t);g.gain.exponentialRampToValueAtTime(.001,t+0.12);o.connect(g);g.connect(a.destination);o.start(t);o.stop(t+0.12);}catch(e){}}

// ── 7-LANE CONFIG ──
const LANE_KEYS=['S','D','F','SP','J','K','L'];
const LANE_COL=['#00D4FF','#FFFFFF','#00D4FF','#FFD700','#A855F7','#FF79C6','#A855F7'];
const LANE_RGB=['0,212,255','255,255,255','0,212,255','255,215,0','168,85,247','255,121,198','168,85,247'];

// ── PARSERS ──
function parseChart(bpm,str){
  const s=60/bpm/4,notes=[];let step=0;
  for(const ch of str){
    if(ch==='|'||ch===' ') continue;
    const l='SDFBJKL'.indexOf(ch);
    if(l>=0) notes.push({t:step*s,l,hit:false,miss:false});
    step++;
  }
  return notes;
}
function parseDrums(bpm,bar,bars){
  const s=60/bpm/4,ev=[];
  for(let b=0;b<bars;b++){
    let step=0;
    for(const ch of bar){
      if(ch==='|') continue;
      const t=(b*16+step)*s;
      if(ch==='K') ev.push({t,fn:kick});
      else if(ch==='S') ev.push({t,fn:snare});
      else if(ch==='H') ev.push({t,fn:(at)=>hat(at,0.12,0.04)});
      else if(ch==='h') ev.push({t,fn:(at)=>hat(at,0.06,0.03)});
      step++;
    }
  }
  return ev;
}

// ── CHART PATTERN LIBRARY ──
// Each string is exactly 16 chars (one bar of 16th notes)
const E='................'; // empty
// Quarter-note patterns
const q1='S...J...D...K...'; // four corners
const q2='F...L...B...S...'; // mixed
const q3='D...K...F...J...'; // variant
const q4='B...B...B...B...'; // center only
// 8th-note patterns
const h1='S.D.J.K.S.D.J.K.'; // left↔right 8ths
const h2='F.B.L.B.F.B.L.B.'; // center weave
const h3='S.D.F.B.J.K.L.K.'; // ascending then back
const h4='L.K.J.B.F.D.S.D.'; // descending then back
const h5='S.B.J.B.D.B.K.B.'; // center alternating
// Medium density
const m1='SD.FBJ.KSD.FBJ.K'; // double-note bursts
const m2='SDF.JKL.SDF.JKL.'; // trio bursts
const m3='LKJ.FDS.LKJ.FDS.'; // reverse trio bursts
const m4='SDFJKL.BSDFJKL..'; // sweep + center
const m5='S.D.F.B.J.K.L...'; // ascending staircase
const m6='L.K.J.B.F.D.S...'; // descending staircase
// High density
const x1='SDFBJKL.SDFBJKL.'; // 7-note stream
const x2='.SDFBJKLSDFBJKL.'; // shifted stream
const x3='SDFBJKLSDFBJKLSD'; // full 16th forward
const x4='SLKJBFDSLKJBFDSL'; // full 16th reverse
const x5='SD.FBJK.SD.FBJK.'; // skip-stream
const x6='DSFJKBLDSFJKBLSD'; // complex
// NEW: song-specific signatures
const pp ='S...L...S...L...'; // pure ping-pong outer (PING)
const pp8='S.L.S.L.S.L.S.L.'; // 8th ping-pong (PING climax)
const ow1='S...K...D...L...'; // outer 4 lanes only (HELLO_WORLD)
const ow2='S.D.K.L.S.D.K.L.'; // outer 8th (HELLO_WORLD)
const lf ='SDF.SDF.SDF.SDF.'; // left trio loop (INIT/FIRST_COMMIT)
const rf ='JKL.JKL.JKL.JKL.'; // right trio loop
const cb2='S.B.J.B.S.B.J.B.'; // center alternating (README)
const cb3='SDB.JKB.SDB.JKB.'; // center + sides (README)
const dk1='SDFB............'; // left block (DOCKER)
const dk2='............JKLB'; // right block
const dk3='SDFB....JKLB....'; // split block
const dk4='....SDFB....JKLB'; // shifted split
const sy1='S..DJ..KS..DF..L'; // syncopated off-beat (NULL_PTR)
const sy2='..SD..JK..FB..KL'; // off-beat pairs
const jS ='S.S.S.S.S.S.S.S.'; // S jack (DEADLOCK)
const jL ='L.L.L.L.L.L.L.L.'; // L jack
const jB ='B.B.B.B.B.B.B.B.'; // center jack
const trSD='SDSDSDSDSDSDSDSD'; // SD trill 16th (SEGFAULT)
const trJK='JKJKJKJKJKJKJKJK'; // JK trill 16th
const trSB='SBSBSBSBSBSBSBSB'; // SB trill

function rp(s,n){let r='';for(let i=0;i<n;i++)r+=s;return r;}
function alt(a,b,n){let r='';for(let i=0;i<n;i++)r+=i%2===0?a:b;return r;}

// ── SONG FACTORY ──
// opts: {bF=bassFilterHz, lW=leadWaveType, lF=leadFilterHz, lV=leadVol, usePluck=false}
let audioOff=0;
const BARS=32;

function makeSong(name,bpm,diff,color,fallTime,drumBar,bassP,leadP,lStart,chartFn,opts){
  const o=opts||{};
  const bF=o.bF||500, lW=o.lW||'square', lF=o.lF||1800, lV=o.lV||0.08;
  const s=60/bpm/4;
  const drums=parseDrums(bpm,drumBar,BARS);
  const bassEv=[];
  for(let b=0;b<BARS;b++) for(const[st,f,d] of bassP)
    bassEv.push({t:(b*16+st)*s,fn:((_t,_f,_d,_fc)=>()=>bass(_t+audioOff,_f,_d*s,_fc))((b*16+st)*s,f,d,bF)});
  const leadEv=[];
  const usePluck=o.usePluck||false;
  for(let b=lStart;b<BARS;b++) for(const[st,f,d] of leadP){
    if(usePluck)
      leadEv.push({t:(b*16+st)*s,fn:((_t,_f)=>()=>pluck(_t+audioOff,_f))((b*16+st)*s,f)});
    else
      leadEv.push({t:(b*16+st)*s,fn:((_t,_f,_d,_lv,_lw,_lfc)=>()=>lead(_t+audioOff,_f,_d*s,_lv,_lw,_lfc))((b*16+st)*s,f,d,lV,lW,lF)});
  }
  return{name,bpm,diff,color,fallTime,
    chart:parseChart(bpm,chartFn()),
    drums,audio:[...bassEv,...leadEv],duration:BARS*16*s};
}

const cv=document.getElementById('cv');

let W=0,H=0,LW=0,LX=[],HIT_Y=0;
function resize(){
  const wrap=document.getElementById('cv-wrap');
  W=cv.width=wrap.clientWidth;H=cv.height=wrap.clientHeight;
  const total=Math.min(W*0.92,504);LW=total/7;
  const ox=(W-total)/2;LX=[0,1,2,3,4,5,6].map(i=>ox+i*LW);HIT_Y=H*0.84;
}
window.addEventListener('resize',resize);

// ── PARTICLES ──
function mkPart(lane,judgeType){
  const x=LX[lane]+LW/2,y=HIT_Y-6;
  let col,cnt,rMax,speed,glowR;
  if(judgeType==='P'){col='#FFD700';cnt=18;rMax=4;speed=3.5;glowR=6;}
  else if(judgeType==='G'){col='#00D4FF';cnt=14;rMax=3.5;speed=3.0;glowR=5;}
  else if(judgeType==='B'){col='#FFB800';cnt=8;rMax=2.5;speed=2.0;glowR=3;}
  else{col='rgba(120,120,150,1)';cnt=6;rMax=2;speed=1.5;glowR=0;}
  for(let i=0;i<cnt;i++){
    const angle=(i/cnt)*Math.PI*2+(Math.random()-.5)*.4;
    const spd=speed*(0.6+Math.random()*.8);
    parts.push({x:x+(Math.random()-.5)*LW*.5,y:y+(Math.random()-.5)*8,
      vx:Math.cos(angle)*spd,vy:Math.sin(angle)*spd-1.2,
      alpha:1,r:1.5+Math.random()*rMax,col,glowR,judgeType});
  }
  if(judgeType==='P'||judgeType==='G'){
    const ringCol=judgeType==='P'?'#FFD700':'#00D4FF';
    parts.push({x,y:HIT_Y,vx:0,vy:0,alpha:0.9,r:0,dr:LW*.55,col:ringCol,glowR:8,ring:true,judgeType});
  }
}
function updateParts(dt){
  parts=parts.filter(p=>p.alpha>0);
  for(const p of parts){
    if(p.ring){p.r+=p.dr*dt*3.5;p.dr*=0.82;p.alpha-=dt*3.2;}
    else{p.x+=p.vx;p.y+=p.vy;p.vy+=0.18;p.alpha-=dt*2.6;}
  }
}

// ── AUDIO SCHEDULE ──
const AHEAD=0.2;
function scheduleAudio(){
  if(!actx) return;
  const now=actx.currentTime,lim=now+AHEAD;
  while(diPtr<drumEv.length){
    const ev=drumEv[diPtr],at=audioOff+ev.t;
    if(at>lim) break;
    if(at>=now-0.02) ev.fn(at);
    diPtr++;
  }
  while(daPtr<audioEv.length){
    const ev=audioEv[daPtr],at=audioOff+ev.t;
    if(at>lim) break;
    if(at>=now-0.02) ev.fn(at);
    daPtr++;
  }
}
function gtime(){return Math.max(0,(performance.now()-gameOff)/1000);}

// ── JUDGMENT ──
const JP=0.055,JG=0.100,JB=0.160;
function hitLane(lane){
  if(STATE!=='playing') return;
  flash[lane]=140;
  const t=gtime();
  let best=null,bd=Infinity;
  for(const n of chart){
    if(n.l!==lane||n.hit||n.miss) continue;
    if(n.t-t>JB+song.fallTime) break;
    const d=Math.abs(t-n.t);
    if(d<bd){bd=d;best=n;}
  }
  if(!best||bd>JB){mkPart(lane,'M');return;}
  best.hit=true;
  const at=actx?actx.currentTime:0;
  if(bd<=JP){sndHit(at,'P');if(gameMode==='arcade')energy=Math.min(100,energy+2);doJudge('PERFECT','#FFD700',300,true,lane,'P');cnt.p++;}
  else if(bd<=JG){sndHit(at,'G');if(gameMode==='arcade')energy=Math.min(100,energy+1);doJudge('GOOD','#00FF88',150,true,lane,'G');cnt.g++;}
  else{sndHit(at,'B');if(gameMode==='arcade')energy=Math.max(0,energy-2);doJudge('BAD','#FFB800',50,false,lane,'B');cnt.b++;}
}
function doJudge(txt,col,pts,addCombo,lane,judgeType){
  if(addCombo) combo++;else combo=0;
  maxCombo=Math.max(maxCombo,combo);
  if(combo===20) feverFlash=1200;
  const mult=combo>=20?2:1;
  score+=pts*mult;
  judgeTxt=txt;judgeCol=col;judgeT=680;
  if(lane!==undefined) mkPart(lane,judgeType||'B');
  updateHUD();
}
function checkMiss(){
  if(STATE!=='playing') return;
  const t=gtime();
  for(const n of chart){
    if(n.hit||n.miss) continue;
    if(t-n.t>JB){
      n.miss=true;cnt.m++;combo=0;
      judgeTxt='MISS';judgeCol='#FF5555';judgeT=500;
      if(gameMode==='arcade'){energy=Math.max(0,energy-10);}
      mkPart(n.l,'M');
      if(actx) sndMiss(actx.currentTime);
      if(gameMode==='arcade'&&energy<=0){failSong();return;}
      updateHUD();
    }
  }
}
function updateHUD(){
  document.getElementById('hv-score').textContent=Math.floor(score).toLocaleString();
  document.getElementById('hv-combo').textContent=combo;
  const mel=document.getElementById('hv-mult');
  if(combo>=20){mel.textContent='×2';mel.style.color='#FFD700';}
  else{mel.textContent='×1';mel.style.color='#E0E0FF';}
  const tot=cnt.p+cnt.g+cnt.b+cnt.m,w=cnt.p+cnt.g*.65+cnt.b*.2;
  document.getElementById('hv-acc').textContent=(tot>0?(w/tot*100).toFixed(2):'100.00')+'%';
  document.getElementById('prog-fill').style.width=Math.min(100,gtime()/song.duration*100).toFixed(1)+'%';
}

// ── RENDER ──
function drawPlay(dt){
  ctx.fillStyle='#07071A';ctx.fillRect(0,0,W,H);
  // scanlines
  ctx.fillStyle='rgba(0,0,0,.045)';
  for(let y=0;y<H;y+=4) ctx.fillRect(0,y,W,1);
  // waveform bg (very faint, decorative only)
  {const wt=performance.now()/1000;
  ctx.save();ctx.strokeStyle='rgba(0,212,255,.022)';ctx.lineWidth=1;
  ctx.beginPath();
  for(let x=0;x<=W;x+=3){
    const v=Math.sin(x*.02+wt*.7)*18+Math.sin(x*.007+wt*.4)*12;
    if(x===0) ctx.moveTo(x,H*.5+v);else ctx.lineTo(x,H*.5+v);
  }
  ctx.stroke();ctx.restore();}
  const t=gtime();
  const xl=LX[0],xr=LX[6]+LW;
  // lane backgrounds & dividers
  for(let i=0;i<7;i++){
    const x=LX[i];
    if(kd[i]) ctx.fillStyle=`rgba(${LANE_RGB[i]},.11)`;
    else if(i===3) ctx.fillStyle='rgba(255,215,0,.03)';
    else ctx.fillStyle='rgba(255,255,255,.012)';
    ctx.fillRect(x,0,LW,H);
    // lane dividers — more vivid
    ctx.save();
    if(i===3){
      ctx.shadowColor='rgba(255,215,0,.35)';ctx.shadowBlur=6;
      ctx.fillStyle='rgba(255,215,0,.22)';
    }else{
      ctx.fillStyle='rgba(0,212,255,.10)';
    }
    ctx.fillRect(x,0,1,H);
    if(i===3){ctx.fillRect(x+LW-1,0,1,H);}
    ctx.restore();
  }
  ctx.fillStyle='rgba(0,212,255,.10)';ctx.fillRect(LX[6]+LW,0,1,H);
  // hit line — brighter, thicker, glow left+right
  ctx.save();
  const gl=ctx.createLinearGradient(xl,0,xr,0);
  gl.addColorStop(0,'rgba(0,212,255,.9)');gl.addColorStop(2/7,'rgba(0,212,255,.75)');
  gl.addColorStop(0.5,'rgba(255,215,0,1.0)');gl.addColorStop(5/7,'rgba(168,85,247,.75)');
  gl.addColorStop(1,'rgba(168,85,247,.9)');
  const fv=combo>=20;
  ctx.shadowColor=fv?'rgba(255,215,0,.9)':'rgba(0,212,255,.55)';ctx.shadowBlur=fv?28:14;
  ctx.fillStyle=gl;ctx.fillRect(xl,HIT_Y-2,xr-xl,fv?6:4);
  // side glow streaks on hit line
  ctx.shadowBlur=0;
  const lg1=ctx.createLinearGradient(xl,0,xl+40,0);
  lg1.addColorStop(0,'rgba(0,212,255,.55)');lg1.addColorStop(1,'rgba(0,212,255,0)');
  ctx.fillStyle=lg1;ctx.fillRect(xl-30,HIT_Y-1,70,fv?4:2);
  const lg2=ctx.createLinearGradient(xr-40,0,xr,0);
  lg2.addColorStop(0,'rgba(168,85,247,0)');lg2.addColorStop(1,'rgba(168,85,247,.55)');
  ctx.fillStyle=lg2;ctx.fillRect(xr-40,HIT_Y-1,70,fv?4:2);
  ctx.restore();
  // flash zone
  for(let i=0;i<7;i++){
    if(flash[i]>0){
      const a=flash[i]/140;
      const fg=ctx.createLinearGradient(LX[i],HIT_Y-90,LX[i],HIT_Y);
      fg.addColorStop(0,`rgba(${LANE_RGB[i]},0)`);
      fg.addColorStop(1,`rgba(${LANE_RGB[i]},${a*.45})`);
      ctx.fillStyle=fg;
      ctx.fillRect(LX[i],HIT_Y-90,LW,90);
      flash[i]=Math.max(0,flash[i]-dt*1000);
    }
  }
  // hit zone circles / diamond — key indicator with glow
  for(let i=0;i<7;i++){
    const x=LX[i]+LW/2;ctx.save();
    const pressed=kd[i];
    ctx.strokeStyle=pressed?LANE_COL[i]:`rgba(${LANE_RGB[i]},.42)`;
    ctx.lineWidth=pressed?2.5:1.5;
    if(pressed){ctx.shadowColor=LANE_COL[i];ctx.shadowBlur=18;}
    if(i===3){
      const sz=LW*.3;ctx.beginPath();
      ctx.moveTo(x,HIT_Y-sz);ctx.lineTo(x+sz,HIT_Y);
      ctx.lineTo(x,HIT_Y+sz);ctx.lineTo(x-sz,HIT_Y);
      ctx.closePath();ctx.stroke();
      if(pressed){ctx.fillStyle=`rgba(255,215,0,.18)`;ctx.fill();}
    }else{
      ctx.beginPath();ctx.arc(x,HIT_Y,LW*.3,0,Math.PI*2);ctx.stroke();
      if(pressed){ctx.fillStyle=`rgba(${LANE_RGB[i]},.15)`;ctx.fill();}
    }
    ctx.restore();
  }
  // tap zone buttons
  {const by=HIT_Y+6,bh=H-20-HIT_Y;
  if(bh>10) for(let i=0;i<7;i++){
    const bx=LX[i]+3,bw=LW-6;
    ctx.save();
    ctx.fillStyle=kd[i]?`rgba(${LANE_RGB[i]},.2)`:`rgba(${LANE_RGB[i]},.05)`;
    ctx.strokeStyle=kd[i]?LANE_COL[i]:`rgba(${LANE_RGB[i]},.15)`;
    ctx.lineWidth=kd[i]?2:1;
    if(kd[i]){ctx.shadowColor=LANE_COL[i];ctx.shadowBlur=18;}
    ctx.beginPath();ctx.roundRect(bx,by,bw,bh,4);ctx.fill();ctx.stroke();
    ctx.restore();
  }}
  // notes
  const ft=song.fallTime/speedMult;
  for(const n of chart){
    if(n.hit||n.miss) continue;
    const dt2=n.t-t;
    if(dt2>ft||dt2<-JB*1.5) continue;
    const ny=HIT_Y*(1-dt2/ft);
    const x=LX[n.l],col=LANE_COL[n.l],rgb=LANE_RGB[n.l];
    const isCenter=n.l===3;
    const nw=LW-8,nh=isCenter?13:10;
    const nx=x+4;
    ctx.save();
    ctx.shadowColor=col;ctx.shadowBlur=isCenter?22:14;
    const ng=ctx.createLinearGradient(nx,ny-nh,nx,ny);
    ng.addColorStop(0,`rgba(${rgb},1)`);ng.addColorStop(1,`rgba(${rgb},0.55)`);
    ctx.fillStyle=ng;
    ctx.beginPath();ctx.roundRect(nx,ny-nh,nw,nh,isCenter?4:3);ctx.fill();
    ctx.shadowBlur=0;ctx.fillStyle='rgba(255,255,255,.40)';
    ctx.fillRect(nx,ny-nh,nw,isCenter?4:3);
    ctx.fillStyle='rgba(0,0,0,.22)';
    ctx.fillRect(nx,ny-2,nw,2);
    ctx.restore();
  }
  updateParts(dt);
  for(const p of parts){
    ctx.save();ctx.globalAlpha=p.alpha;
    if(p.ring){
      ctx.strokeStyle=p.col;ctx.lineWidth=2;
      if(p.glowR){ctx.shadowColor=p.col;ctx.shadowBlur=p.glowR*3;}
      ctx.beginPath();ctx.arc(p.x,p.y,Math.max(0,p.r),0,Math.PI*2);ctx.stroke();
    }else{
      if(p.glowR){ctx.shadowColor=p.col;ctx.shadowBlur=p.glowR;}
      ctx.fillStyle=p.col;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
    }
    ctx.restore();
  }
  // Energy bar
  {const bx=LX[0],bw=LX[6]+LW-LX[0],by=H-10,bh=5;
  if(gameMode==='arcade'){
  ctx.fillStyle='#1A1A3A';ctx.fillRect(bx,by,bw,bh);
  const fv2=combo>=20&&energy>0;
  const ecol=fv2?'#FFD700':energy>60?'#00FF88':energy>30?'#FFB800':'#FF5555';
  ctx.save();ctx.shadowColor=ecol;ctx.shadowBlur=fv2?10:4;ctx.fillStyle=ecol;
  ctx.fillRect(bx,by,bw*(energy/100),bh);ctx.restore();
  ctx.textAlign='left';ctx.textBaseline='bottom';
  ctx.font=`400 9px 'DM Mono',monospace`;
  ctx.fillStyle=fv2?'rgba(255,215,0,.65)':'rgba(70,70,130,.9)';
  ctx.fillText('ENERGY',bx,by-2);}
  else{
    // SCORE 모드: 하단 바를 점수 진행 표시로 대체
    const tot=cnt.p+cnt.g+cnt.b+cnt.m;
    const acc=tot>0?(cnt.p+cnt.g*.65+cnt.b*.2)/tot*100:100;
    const acol=acc>=95?'#FFD700':acc>=80?'#00FF88':'#8B5CF6';
    ctx.fillStyle='#1A1A3A';ctx.fillRect(bx,by,bw,bh);
    ctx.save();ctx.fillStyle=acol;ctx.fillRect(bx,by,bw*(Math.min(acc,100)/100),bh);ctx.restore();
    ctx.textAlign='left';ctx.textBaseline='bottom';
    ctx.font=`400 9px 'DM Mono',monospace`;
    ctx.fillStyle='rgba(255,215,0,.55)';
    ctx.fillText('SCORE MODE',bx,by-2);}
  }
  // Fever burst text
  if(feverFlash>0){
    ctx.save();ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.font=`700 ${Math.round(H*.055)}px 'DM Mono',monospace`;
    const fa=Math.min(1,feverFlash/500);
    ctx.fillStyle=`rgba(255,215,0,${fa})`;ctx.shadowColor='#FFD700';ctx.shadowBlur=28;
    ctx.fillText('FEVER! ×2',W/2,HIT_Y-130);ctx.restore();
    feverFlash=Math.max(0,feverFlash-dt*1000);
  }
  // key labels with glow
  ctx.textAlign='center';ctx.textBaseline='middle';
  const ky=HIT_Y+(H-HIT_Y)*.48,kfs=Math.max(8,Math.round(LW*.38));
  for(let i=0;i<7;i++){
    const x=LX[i]+LW/2;ctx.save();
    if(kd[i]){ctx.shadowColor=LANE_COL[i];ctx.shadowBlur=16;ctx.fillStyle=LANE_COL[i];}
    else{ctx.fillStyle=`rgba(${LANE_RGB[i]},.5)`;}
    ctx.font=`500 ${i===3?Math.round(kfs*.72):kfs}px 'DM Mono',monospace`;
    ctx.fillText(LANE_KEYS[i],x,ky);ctx.restore();
  }
  // combo glow — brighter at higher combo
  {const comboEl=document.getElementById('hv-combo');
  const comboGlow=combo>=50?`0 0 ${Math.min(32,12+combo/10)}px #00D4FF,0 0 ${Math.min(20,6+combo/20)}px rgba(0,212,255,.5)`
    :combo>=20?'0 0 16px #FFD700,0 0 8px rgba(255,215,0,.4)':'none';
  comboEl.style.textShadow=comboGlow;
  comboEl.style.color=combo>=20?'#FFD700':'var(--cyan)';}
  const jel=document.getElementById('judge');
  if(judgeT>0){
    jel.textContent=judgeTxt;jel.style.color=judgeCol;
    jel.style.opacity=Math.min(1,judgeT/180).toString();
    jel.style.top=(HIT_Y-96)+'px';
    const jGlow=judgeTxt==='PERFECT'?`0 0 24px ${judgeCol},0 0 48px rgba(255,215,0,.4)`:`0 0 18px ${judgeCol}`;
    jel.style.textShadow=jGlow;
    const scl=judgeTxt==='PERFECT'?1+(1-judgeT/680)*.12:1+(1-judgeT/680)*.07;
    jel.style.transform=`translateX(-50%) scale(${scl})`;
    judgeT-=dt*1000;
  }else{jel.style.opacity='0';}
  if(countdown>0){
    ctx.save();
    ctx.fillStyle=`rgba(7,7,26,${Math.min(.88,countdown)})`;ctx.fillRect(0,0,W,H);
    const n=Math.ceil(countdown);
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.font=`500 ${Math.round(H*.16)}px 'DM Mono',monospace`;
    const frac=countdown%1;
    ctx.fillStyle=`rgba(255,215,0,${frac<.5?frac*2:2-frac*2})`;
    ctx.shadowColor='rgba(255,215,0,.6)';ctx.shadowBlur=30;
    ctx.fillText(n>0?n:'GO!',W/2,H/2);ctx.restore();
  }
}
function drawIdle(){
  ctx.fillStyle='#07071A';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='rgba(0,0,0,.04)';
  for(let y=0;y<H;y+=4) ctx.fillRect(0,y,W,1);
  const t=performance.now()/1000;
  // idle waveform
  ctx.save();ctx.strokeStyle='rgba(0,212,255,.018)';ctx.lineWidth=1;
  ctx.beginPath();
  for(let x=0;x<=W;x+=3){
    const v=Math.sin(x*.018+t*.5)*22+Math.sin(x*.006+t*.32)*14;
    if(x===0) ctx.moveTo(x,H*.5+v);else ctx.lineTo(x,H*.5+v);
  }
  ctx.stroke();ctx.restore();
  for(let i=0;i<7;i++){
    const ph=i*Math.PI/3.5;
    let a=.02+Math.sin(t*.6+ph)*.013;if(i===3) a*=2.2;
    ctx.fillStyle=`rgba(${LANE_RGB[i]},${a})`;ctx.fillRect(LX[i],0,LW,H);
    ctx.save();
    if(i===3){ctx.shadowColor='rgba(255,215,0,.25)';ctx.shadowBlur=4;ctx.fillStyle='rgba(255,215,0,.2)';}
    else ctx.fillStyle='rgba(0,212,255,.10)';
    ctx.fillRect(LX[i],0,1,H);ctx.restore();
  }
  ctx.fillStyle='rgba(0,212,255,.10)';ctx.fillRect(LX[6]+LW,0,1,H);
}

// ── GAME LOOP ──
let pauseAt=0; // audioContext time when paused
function loop(ts){
  rafId=requestAnimationFrame(loop);
  const dt=Math.min((ts-lastTs)/1000,.05);lastTs=ts;
  if(STATE==='select'||STATE==='paused'){drawIdle();return;}
  if(STATE==='playing'){
    if(countdown>0){countdown-=dt;drawPlay(dt);return;}
    scheduleAudio();checkMiss();
    if(gtime()>song.duration+1.2){endSong();return;}
    drawPlay(dt);updateHUD();
  }
}
function pauseGame(){
  if(STATE!=='playing') return;
  STATE='paused';
  pauseAt=actx?actx.currentTime:0;
  document.getElementById('scr-pause').classList.remove('hidden');
  document.getElementById('pause-songname').textContent=song.name;
  document.getElementById('mbt-ps').textContent='▶';
  kd.fill(false);
}
function resumeGame(){
  if(STATE!=='paused') return;
  // shift audioOff forward by however long we were paused
  if(actx){
    const pausedFor=actx.currentTime-pauseAt;
    audioOff+=pausedFor;
    gameOff+=pausedFor*1000;
  }
  STATE='playing';
  document.getElementById('scr-pause').classList.add('hidden');
  document.getElementById('mbt-ps').textContent='⏸';
  lastTs=performance.now();
}

// ── FLOW ──
function showSelect(){
  STATE='select';
  document.getElementById('scr-select').classList.remove('hidden');
  document.getElementById('scr-result').classList.add('hidden');
  document.getElementById('scr-pause').classList.add('hidden');
  document.getElementById('hud').classList.add('hidden');
  document.getElementById('prog').classList.add('hidden');
  document.getElementById('esc-hint').classList.add('hidden');
  document.getElementById('mob-ctrl').classList.add('hidden');
}
function startSong(s){
  song=s;
  chart=s.chart.map(n=>({...n,hit:false,miss:false}));
  drumEv=[...s.drums];audioEv=[...s.audio];
  score=0;combo=0;maxCombo=0;cnt={p:0,g:0,b:0,m:0};
  parts=[];flash=new Array(7).fill(0);kd=new Array(7).fill(false);
  judgeT=0;diPtr=0;daPtr=0;energy=100;feverFlash=0;
  const WAIT=1.5;ac();
  audioOff=actx.currentTime+WAIT;gameOff=performance.now()+WAIT*1000;countdown=WAIT;
  STATE='playing';
  document.getElementById('scr-select').classList.add('hidden');
  document.getElementById('scr-result').classList.add('hidden');
  document.getElementById('hud').classList.remove('hidden');
  document.getElementById('prog').classList.remove('hidden');
  document.getElementById('hv-score').textContent='0';
  document.getElementById('hv-combo').textContent='0';
  document.getElementById('hv-acc').textContent='100.00%';
  document.getElementById('prog-fill').style.width='0%';
  document.getElementById('esc-hint').classList.remove('hidden');
  const mb=document.getElementById('mode-badge');
  mb.className=gameMode;mb.textContent=gameMode==='arcade'?'ARCADE':'SCORE';mb.classList.remove('hidden');
  const mc=document.getElementById('mob-ctrl');
  mc.classList.remove('hidden');
  document.getElementById('mbt-sv').textContent=speedMult.toFixed(1)+'×';
  document.getElementById('mbt-ps').textContent='⏸';
}
function endSong(){
  STATE='result';
  document.getElementById('hud').classList.add('hidden');
  document.getElementById('prog').classList.add('hidden');
  document.getElementById('mode-badge').classList.add('hidden');
  const tot=cnt.p+cnt.g+cnt.b+cnt.m,w=cnt.p+cnt.g*.65+cnt.b*.2;
  const acc=tot>0?w/tot*100:100;
  let grade,gc;
  if(acc>=98&&cnt.m===0){grade='S';gc='gS';}
  else if(acc>=90){grade='A';gc='gA';}
  else if(acc>=80){grade='B';gc='gB';}
  else if(acc>=65){grade='C';gc='gC';}
  else{grade='D';gc='gD';}
  const sc=Math.floor(score);
  const hk='rh-hi-'+song.name,gk='rh-hg-'+song.name;
  if(sc>parseInt(localStorage.getItem(hk)||'0')){localStorage.setItem(hk,sc);localStorage.setItem(gk,grade);}
  document.getElementById('mob-ctrl').classList.add('hidden');
  document.getElementById('r-title').textContent=song.name;
  const gel=document.getElementById('r-grade');
  gel.textContent=grade;gel.className='rgrade '+gc;
  document.getElementById('rscore').textContent=sc.toLocaleString();
  document.getElementById('r-p').textContent=cnt.p;document.getElementById('r-g').textContent=cnt.g;
  document.getElementById('r-b').textContent=cnt.b;document.getElementById('r-m').textContent=cnt.m;
  document.getElementById('r-c').textContent=maxCombo;document.getElementById('r-a').textContent=acc.toFixed(2)+'%';
  const bn=document.getElementById('r-banner');
  if(grade==='S'||grade==='A'){
    bn.className='ok-banner';
    bn.textContent='[PROCESS COMPLETE]\nprocess: rhythm.exe  finished\naudio_buffer        : OK\nexit_code           : 0';
  }else{
    bn.className='ok-banner';
    bn.textContent='[PROCESS COMPLETE]\nprocess: rhythm.exe  finished\ngrade               : '+grade+'\nexit_code           : 0';
  }
  bn.style.display='';
  document.getElementById('scr-result').classList.remove('hidden');
}

function failSong(){
  STATE='result';
  document.getElementById('hud').classList.add('hidden');
  document.getElementById('prog').classList.add('hidden');
  document.getElementById('esc-hint').classList.add('hidden');
  document.getElementById('mob-ctrl').classList.add('hidden');
  document.getElementById('mode-badge').classList.add('hidden');
  const tot=cnt.p+cnt.g+cnt.b+cnt.m,w=cnt.p+cnt.g*.65+cnt.b*.2;
  const acc=tot>0?w/tot*100:100;
  document.getElementById('r-title').textContent=song.name;
  const gel=document.getElementById('r-grade');
  gel.textContent='FAIL';gel.className='rgrade gD';
  document.getElementById('rscore').textContent=Math.floor(score).toLocaleString();
  document.getElementById('r-p').textContent=cnt.p;document.getElementById('r-g').textContent=cnt.g;
  document.getElementById('r-b').textContent=cnt.b;document.getElementById('r-m').textContent=cnt.m;
  document.getElementById('r-c').textContent=maxCombo;document.getElementById('r-a').textContent=acc.toFixed(2)+'%';
  const bn=document.getElementById('r-banner');
  bn.className='err-banner';
  bn.textContent='AUDIO_BUFFER_UNDERRUN\ntiming violation detected\nmissed_notes > threshold\nprocess: rhythm.exe [FAIL]';
  bn.style.display='';
  document.getElementById('scr-result').classList.remove('hidden');
}

// ── INPUT ──
const KMAP={s:0,d:1,f:2,' ':3,j:4,k:5,l:6};
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    e.preventDefault();
    if(STATE==='playing') pauseGame();
    else if(STATE==='paused') resumeGame();
    return;
  }
  if(e.key==='+'||e.key==='='||e.key==='NumpadAdd'){
    if(STATE==='playing'||STATE==='paused'){
      e.preventDefault();
      speedMult=Math.min(5.0,parseFloat((speedMult+0.1).toFixed(1)));
      const sv=speedMult.toFixed(1)+'×';
      document.getElementById('hv-speed').textContent=sv;
      document.getElementById('mbt-sv').textContent=sv;
    }
    return;
  }
  if(e.key==='-'||e.key==='NumpadSubtract'){
    if(STATE==='playing'||STATE==='paused'){
      e.preventDefault();
      speedMult=Math.max(0.1,parseFloat((speedMult-0.1).toFixed(1)));
      const sv=speedMult.toFixed(1)+'×';
      document.getElementById('hv-speed').textContent=sv;
      document.getElementById('mbt-sv').textContent=sv;
    }
    return;
  }
  if(STATE==='select') return;
  if(STATE==='result'){if(e.key==='Enter'||e.key===' '){e.preventDefault();startSong(song);}return;}
  if(STATE==='paused') return;
  const key=e.key===' '?' ':e.key.toLowerCase();
  const l=KMAP[key];if(l===undefined) return;
  e.preventDefault();if(!kd[l]){kd[l]=true;hitLane(l);}
});
document.addEventListener('keyup',e=>{
  const key=e.key===' '?' ':e.key.toLowerCase();
  const l=KMAP[key];if(l!==undefined) kd[l]=false;
});
const wrap=document.getElementById('cv-wrap'),touches={};
wrap.addEventListener('touchstart',e=>{
  if(STATE==='select') return;
  e.preventDefault();
  if(STATE==='result'){startSong(song);return;}
  [...e.changedTouches].forEach(touch=>{
    const rect=wrap.getBoundingClientRect(),x=touch.clientX-rect.left;
    for(let i=0;i<7;i++){if(x>=LX[i]&&x<LX[i]+LW){touches[touch.identifier]=i;kd[i]=true;hitLane(i);break;}}
  });
},{passive:false});
wrap.addEventListener('touchend',e=>{
  if(STATE==='select') return;
  e.preventDefault();
  [...e.changedTouches].forEach(touch=>{
    const l=touches[touch.identifier];if(l!==undefined){kd[l]=false;delete touches[touch.identifier];}
  });
},{passive:false});
document.getElementById('btn-retry').addEventListener('click',()=>startSong(song));
document.getElementById('btn-sel').addEventListener('click',showSelect);
document.getElementById('btn-resume').addEventListener('click',resumeGame);
document.getElementById('btn-quit').addEventListener('click',showSelect);

// ── MOBILE CTRL ──
function updMbtSpd(){
  const sv=speedMult.toFixed(1)+'×';
  document.getElementById('hv-speed').textContent=sv;
  document.getElementById('mbt-sv').textContent=sv;
}
document.getElementById('mbt-sm').addEventListener('click',()=>{
  if(STATE==='playing'||STATE==='paused'){speedMult=Math.max(0.1,parseFloat((speedMult-0.1).toFixed(1)));updMbtSpd();}
});
document.getElementById('mbt-sp').addEventListener('click',()=>{
  if(STATE==='playing'||STATE==='paused'){speedMult=Math.min(5.0,parseFloat((speedMult+0.1).toFixed(1)));updMbtSpd();}
});
document.getElementById('mbt-ps').addEventListener('click',()=>{
  if(STATE==='playing') pauseGame();
  else if(STATE==='paused') resumeGame();
});

// ── SONG LIST UI ──
function renderSongList(filter){
  const list=document.getElementById('song-list');list.innerHTML='';
  SONGS.forEach(s=>{
    if(filter&&filter!=='ALL'&&s.diff!==filter) return;
    const card=document.createElement('div');card.className='song-card';
    const dc=s.diff==='EASY'?'d-easy':s.diff==='MEDIUM'?'d-mid':'d-hard';
    const hiSc=localStorage.getItem('rh-hi-'+s.name);
    const hiGr=localStorage.getItem('rh-hg-'+s.name);
    const grCol=hiGr==='S'?'var(--cyan)':hiGr==='A'?'#00FF88':hiGr==='B'?'var(--purple)':hiGr==='C'?'#FFB800':'#FF5555';
    const hiHtml=hiSc?`<span class="song-hi"><span style="color:${grCol}">${hiGr}</span> ${parseInt(hiSc).toLocaleString()}</span>`:'';
    card.innerHTML=`<div><div class="song-name">${s.name}</div><span class="diff ${dc}">${s.diff}</span>${hiHtml}</div><div class="song-bpm">${s.bpm} BPM</div>`;
    card.addEventListener('click',()=>startSong(s));list.appendChild(card);
  });
}
document.querySelectorAll('.dtab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.dtab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');renderSongList(tab.dataset.d);
  });
});
document.querySelectorAll('.mtab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.mtab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');gameMode=tab.dataset.m;
  });
});

// ── BOOT ──
resize();renderSongList('ALL');lastTs=performance.now();requestAnimationFrame(loop);
</script>
