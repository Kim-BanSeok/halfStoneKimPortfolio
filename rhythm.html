<script>
'use strict';

// ── AUDIO ──
let actx=null;
function ac(){
  if(!actx) actx=new(window.AudioContext||window.webkitAudioContext)();
  if(actx.state==='suspended') actx.resume();
  return actx;
}
let _noiseBuf=null;
function noiseBuf(){
  const a=ac();
  if(!_noiseBuf||_noiseBuf.sampleRate!==a.sampleRate){
    const sz=a.sampleRate*0.5,b=a.createBuffer(1,sz,a.sampleRate),d=b.getChannelData(0);
    for(let i=0;i<sz;i++) d[i]=Math.random()*2-1;
    _noiseBuf=b;
  }
  return _noiseBuf;
}
const MV=0.72;
function kick(t){try{const a=ac(),o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.frequency.setValueAtTime(160,t);o.frequency.exponentialRampToValueAtTime(38,t+0.13);g.gain.setValueAtTime(MV,t);g.gain.exponentialRampToValueAtTime(.001,t+0.28);o.start(t);o.stop(t+0.28);}catch(e){}}
function snare(t){try{const a=ac(),src=a.createBufferSource(),flt=a.createBiquadFilter(),g=a.createGain();src.buffer=noiseBuf();flt.type='bandpass';flt.frequency.value=2200;flt.Q.value=0.7;src.connect(flt);flt.connect(g);g.connect(a.destination);g.gain.setValueAtTime(MV*0.5,t);g.gain.exponentialRampToValueAtTime(.001,t+0.18);src.start(t);src.stop(t+0.18);const o2=a.createOscillator(),g2=a.createGain();o2.connect(g2);g2.connect(a.destination);o2.frequency.value=190;g2.gain.setValueAtTime(MV*0.12,t);g2.gain.exponentialRampToValueAtTime(.001,t+0.07);o2.start(t);o2.stop(t+0.07);}catch(e){}}
function hat(t,vol=0.1,dur=0.04){try{const a=ac(),src=a.createBufferSource(),flt=a.createBiquadFilter(),g=a.createGain();src.buffer=noiseBuf();flt.type='highpass';flt.frequency.value=9500;src.connect(flt);flt.connect(g);g.connect(a.destination);g.gain.setValueAtTime(vol*MV,t);g.gain.exponentialRampToValueAtTime(.001,t+dur);src.start(t);src.stop(t+dur);}catch(e){}}
function bass(t,freq,dur){try{const a=ac(),o=a.createOscillator(),flt=a.createBiquadFilter(),g=a.createGain();o.type='sawtooth';flt.type='lowpass';flt.frequency.value=500;o.connect(flt);flt.connect(g);g.connect(a.destination);o.frequency.value=freq;g.gain.setValueAtTime(MV*0.28,t);g.gain.exponentialRampToValueAtTime(.001,t+dur);o.start(t);o.stop(t+dur);}catch(e){}}
function lead(t,freq,dur,vol=0.1){try{const a=ac(),o=a.createOscillator(),flt=a.createBiquadFilter(),g=a.createGain();o.type='square';flt.type='lowpass';flt.frequency.value=1800;o.connect(flt);flt.connect(g);g.connect(a.destination);o.frequency.value=freq;g.gain.setValueAtTime(vol*MV,t);g.gain.exponentialRampToValueAtTime(.001,t+dur);o.start(t);o.stop(t+dur);}catch(e){}}
function sndHit(t,q){try{const a=ac(),o=a.createOscillator(),g=a.createGain();const f=q==='P'?1047:q==='G'?880:440;o.type='sine';o.frequency.setValueAtTime(f,t);o.frequency.exponentialRampToValueAtTime(f*0.7,t+0.07);g.gain.setValueAtTime(0.22,t);g.gain.exponentialRampToValueAtTime(.001,t+0.09);o.connect(g);g.connect(a.destination);o.start(t);o.stop(t+0.09);}catch(e){}}
function sndMiss(t){try{const a=ac(),o=a.createOscillator(),g=a.createGain();o.type='sawtooth';o.frequency.value=110;g.gain.setValueAtTime(0.1,t);g.gain.exponentialRampToValueAtTime(.001,t+0.12);o.connect(g);g.connect(a.destination);o.start(t);o.stop(t+0.12);}catch(e){}}

// ── 7-LANE CONFIG ──
const LANE_KEYS=['S','D','F','SP','J','K','L'];
const LANE_COL=['#5CE0FF','#00D4FF','#0099CC','#FFD700','#B09AFF','#8B5CF6','#6633CC'];
const LANE_RGB=['92,224,255','0,212,255','0,153,204','255,215,0','176,154,255','139,92,246','102,51,204'];

// ── PARSERS ──
function parseChart(bpm,str){
  const s=60/bpm/4,notes=[];let step=0;
  for(const ch of str){
    if(ch==='|'||ch===' ') continue;
    const l='SDFBJKL'.indexOf(ch);
    if(l>=0) notes.push({t:step*s,l,hit:false,miss:false});
    step++;
  }
  return notes;
}
function parseDrums(bpm,bar,bars){
  const s=60/bpm/4,ev=[];
  for(let b=0;b<bars;b++){
    let step=0;
    for(const ch of bar){
      if(ch==='|') continue;
      const t=(b*16+step)*s;
      if(ch==='K') ev.push({t,fn:kick});
      else if(ch==='S') ev.push({t,fn:snare});
      else if(ch==='H') ev.push({t,fn:(at)=>hat(at,0.12,0.04)});
      else if(ch==='h') ev.push({t,fn:(at)=>hat(at,0.06,0.03)});
      step++;
    }
  }
  return ev;
}

// ── CHART HELPERS ──
const E='................';
const q1='S...J...D...K...',q2='F...L...B...S...',q3='D...K...F...J...',q4='B...B...B...B...',q5='S...J...F...L...';
const h1='S.D.J.K.S.D.J.K.',h2='F.B.L.B.F.B.L.B.',h3='S.D.F.B.J.K.L.K.',h4='L.K.J.B.F.D.S.D.',h5='S.B.J.B.D.B.K.B.';
const m1='SD.FBJ.KSD.FBJ.K',m2='SDF.JKL.SDF.JKL.',m3='LKJ.FDS.LKJ.FDS.',m4='SDFJKL.BSDFJKL..',m5='S.D.F.B.J.K.L...',m6='L.K.J.B.F.D.S...';
const x1='SDFBJKL.SDFBJKL.',x2='.SDFBJKLSDFBJKL.',x3='SDFBJKLSDFBJKLSD',x4='SLKJBFDSLKJBFDSL',x5='SD.FBJK.SD.FBJK.',x6='DSFJKBLDSFJKBLSD';
function rp(s,n){let r='';for(let i=0;i<n;i++)r+=s;return r;}
function alt(a,b,n){let r='';for(let i=0;i<n;i++)r+=i%2===0?a:b;return r;}

// ── SONG FACTORY ──
let audioOff=0;
const BARS=32;

function makeSong(name,bpm,diff,color,fallTime,drumBar,bassP,leadP,lStart,chartFn){
  const s=60/bpm/4;
  const drums=parseDrums(bpm,drumBar,BARS);
  const bassEv=[];
  for(let b=0;b<BARS;b++) for(const[st,f,d] of bassP)
    bassEv.push({t:(b*16+st)*s,fn:((_t,_f,_d)=>()=>bass(_t+audioOff,_f,_d*s))((b*16+st)*s,f,d)});
  const leadEv=[];
  for(let b=lStart;b<BARS;b++) for(const[st,f,d] of leadP)
    leadEv.push({t:(b*16+st)*s,fn:((_t,_f,_d)=>()=>lead(_t+audioOff,_f,_d*s,0.08))((b*16+st)*s,f,d)});
  return{name,bpm,diff,color,fallTime,
    chart:parseChart(bpm,chartFn()),
    drums,audio:[...bassEv,...leadEv],duration:BARS*16*s};
}

// ── CANVAS ──
const cv=document.getElementById('cv');
const ctx=cv.getContext('2d');
let W=0,H=0,LW=0,LX=[],HIT_Y=0;

function resize(){
  const wrap=document.getElementById('cv-wrap');
  W=cv.width=wrap.clientWidth; H=cv.height=wrap.clientHeight;
  const total=Math.min(W*0.92,504);
  LW=total/7;
  const ox=(W-total)/2;
  LX=[0,1,2,3,4,5,6].map(i=>ox+i*LW);
  HIT_Y=H*0.84;
}
window.addEventListener('resize',resize);

// ── STATE ──
let STATE='select',song=null;
let chart=[],drumEv=[],audioEv=[];
let diPtr=0,daPtr=0;
let score=0,combo=0,maxCombo=0;
let cnt={p:0,g:0,b:0,m:0};
let flash=new Array(7).fill(0),kd=new Array(7).fill(false);
let parts=[],judgeT=0,judgeTxt='',judgeCol='#fff';
let rafId=0,lastTs=0,countdown=0,gameOff=0;

// ── PARTICLES ──
function mkPart(lane){
  const x=LX[lane]+LW/2,y=HIT_Y-6;
  for(let i=0;i<12;i++)
    parts.push({x:x+(Math.random()-.5)*LW*.8,y,
      vx:(Math.random()-.5)*2.5,vy:-2.5-Math.random()*3,
      alpha:1,r:2+Math.random()*2.5,col:LANE_COL[lane]});
}
function updateParts(dt){
  parts=parts.filter(p=>p.alpha>0);
  for(const p of parts){p.x+=p.vx;p.y+=p.vy;p.vy+=0.15;p.alpha-=dt*2.8;}
}

// ── AUDIO SCHEDULE ──
const AHEAD=0.2;
function scheduleAudio(){
  if(!actx) return;
  const now=actx.currentTime,lim=now+AHEAD;
  while(diPtr<drumEv.length){
    const ev=drumEv[diPtr],at=audioOff+ev.t;
    if(at>lim) break;
    if(at>=now-0.02) ev.fn(at);
    diPtr++;
  }
  while(daPtr<audioEv.length){
    const ev=audioEv[daPtr],at=audioOff+ev.t;
    if(at>lim) break;
    if(at>=now-0.02) ev.fn(at);
    daPtr++;
  }
}

function gtime(){return Math.max(0,(performance.now()-gameOff)/1000);}

// ── JUDGMENT ──
const JP=0.055,JG=0.100,JB=0.160;
function hitLane(lane){
  if(STATE!=='playing') return;
  flash[lane]=140; mkPart(lane);
  const t=gtime();
  let best=null,bd=Infinity;
  for(const n of chart){
    if(n.l!==lane||n.hit||n.miss) continue;
    if(n.t-t>JB+song.fallTime) break;
    const d=Math.abs(t-n.t);
    if(d<bd){bd=d;best=n;}
  }
  if(!best||bd>JB) return;
  best.hit=true;
  const at=actx?actx.currentTime:0;
  if(bd<=JP){sndHit(at,'P');doJudge('PERFECT','#FFD700',300,true);cnt.p++;}
  else if(bd<=JG){sndHit(at,'G');doJudge('GOOD','#00FF88',150,true);cnt.g++;}
  else{sndHit(at,'B');doJudge('BAD','#FFB800',50,false);cnt.b++;}
}
function doJudge(txt,col,pts,addCombo){
  score+=pts*(1+Math.floor(combo/10)*0.1);
  if(addCombo) combo++; else combo=0;
  maxCombo=Math.max(maxCombo,combo);
  judgeTxt=txt;judgeCol=col;judgeT=680;
  updateHUD();
}
function checkMiss(){
  const t=gtime();
  for(const n of chart){
    if(n.hit||n.miss) continue;
    if(t-n.t>JB){
      n.miss=true;cnt.m++;combo=0;
      judgeTxt='MISS';judgeCol='#FF5555';judgeT=500;
      if(actx) sndMiss(actx.currentTime);
      updateHUD();
    }
  }
}
function updateHUD(){
  document.getElementById('hv-score').textContent=Math.floor(score).toLocaleString();
  document.getElementById('hv-combo').textContent=combo;
  const tot=cnt.p+cnt.g+cnt.b+cnt.m,w=cnt.p+cnt.g*.65+cnt.b*.2;
  document.getElementById('hv-acc').textContent=(tot>0?(w/tot*100).toFixed(2):'100.00')+'%';
  document.getElementById('prog-fill').style.width=Math.min(100,gtime()/song.duration*100).toFixed(1)+'%';
}

// ── RENDER ──
function drawPlay(dt){
  ctx.fillStyle='#07071A';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='rgba(0,0,0,.035)';
  for(let y=0;y<H;y+=4) ctx.fillRect(0,y,W,1);

  const t=gtime();
  const xl=LX[0],xr=LX[6]+LW;

  for(let i=0;i<7;i++){
    const x=LX[i];
    if(kd[i]) ctx.fillStyle=`rgba(${LANE_RGB[i]},.09)`;
    else if(i===3) ctx.fillStyle='rgba(255,215,0,.022)';
    else ctx.fillStyle='rgba(255,255,255,.01)';
    ctx.fillRect(x,0,LW,H);
    ctx.fillStyle=i===3?'rgba(255,215,0,.15)':'#1E1E4A';
    ctx.fillRect(x,0,1,H);
    if(i===3) ctx.fillRect(x+LW-1,0,1,H);
  }
  ctx.fillStyle='#1E1E4A';ctx.fillRect(LX[6]+LW,0,1,H);

  ctx.save();
  const gl=ctx.createLinearGradient(xl,0,xr,0);
  gl.addColorStop(0,'rgba(92,224,255,.8)');
  gl.addColorStop(2/7,'rgba(0,153,204,.6)');
  gl.addColorStop(0.5,'rgba(255,215,0,.95)');
  gl.addColorStop(5/7,'rgba(176,154,255,.6)');
  gl.addColorStop(1,'rgba(102,51,204,.8)');
  ctx.shadowColor='rgba(255,215,0,.3)';ctx.shadowBlur=10;
  ctx.fillStyle=gl;ctx.fillRect(xl,HIT_Y-1,xr-xl,3);
  ctx.restore();

  for(let i=0;i<7;i++){
    if(flash[i]>0){
      const a=flash[i]/140;
      ctx.fillStyle=`rgba(${LANE_RGB[i]},${a*.35})`;
      ctx.fillRect(LX[i],HIT_Y-75,LW,75);
      flash[i]=Math.max(0,flash[i]-dt*1000);
    }
  }

  for(let i=0;i<7;i++){
    const x=LX[i]+LW/2;
    ctx.save();
    const active=kd[i];
    ctx.strokeStyle=active?LANE_COL[i]:`rgba(${LANE_RGB[i]},.35)`;
    ctx.lineWidth=active?2.5:1.5;
    if(active){ctx.shadowColor=LANE_COL[i];ctx.shadowBlur=14;}
    if(i===3){
      const sz=LW*.3;
      ctx.beginPath();
      ctx.moveTo(x,HIT_Y-sz);ctx.lineTo(x+sz,HIT_Y);
      ctx.lineTo(x,HIT_Y+sz);ctx.lineTo(x-sz,HIT_Y);
      ctx.closePath();ctx.stroke();
    } else {
      ctx.beginPath();ctx.arc(x,HIT_Y,LW*.3,0,Math.PI*2);ctx.stroke();
    }
    ctx.restore();
  }

  const ft=song.fallTime;
  for(const n of chart){
    if(n.hit||n.miss) continue;
    const dt2=n.t-t;
    if(dt2>ft||dt2<-JB*1.5) continue;
    const ny=HIT_Y*(1-dt2/ft);
    const x=LX[n.l],col=LANE_COL[n.l];
    const isCenter=n.l===3;
    ctx.save();
    ctx.shadowColor=col;ctx.shadowBlur=isCenter?20:12;
    ctx.fillStyle=col;
    const nw=LW-8,nh=isCenter?13:10;
    ctx.beginPath();
    ctx.roundRect(x+4,ny-nh,nw,nh,isCenter?4:3);
    ctx.fill();
    ctx.shadowBlur=0;
    ctx.fillStyle='rgba(255,255,255,.3)';
    ctx.fillRect(x+4,ny-nh,nw,isCenter?5:4);
    ctx.restore();
  }

  updateParts(dt);
  for(const p of parts){
    ctx.save();ctx.globalAlpha=p.alpha;ctx.fillStyle=p.col;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }

  ctx.textAlign='center';ctx.textBaseline='middle';
  const ky=HIT_Y+(H-HIT_Y)*.48;
  const kfs=Math.max(8,Math.round(LW*.38));
  for(let i=0;i<7;i++){
    const x=LX[i]+LW/2;
    ctx.fillStyle=kd[i]?LANE_COL[i]:`rgba(${LANE_RGB[i]},.5)`;
    ctx.font=`500 ${i===3?Math.round(kfs*.72):kfs}px 'DM Mono',monospace`;
    ctx.fillText(LANE_KEYS[i],x,ky);
  }

  const jel=document.getElementById('judge');
  if(judgeT>0){
    jel.textContent=judgeTxt;jel.style.color=judgeCol;
    jel.style.opacity=Math.min(1,judgeT/180).toString();
    jel.style.top=(HIT_Y-90)+'px';
    jel.style.textShadow=`0 0 18px ${judgeCol}`;
    jel.style.transform=`translateX(-50%) scale(${1+(1-judgeT/680)*.08})`;
    judgeT-=dt*1000;
  } else {jel.style.opacity='0';}

  if(countdown>0){
    ctx.save();
    ctx.fillStyle=`rgba(7,7,26,${Math.min(.88,countdown)})`;
    ctx.fillRect(0,0,W,H);
    const n=Math.ceil(countdown);
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.font=`500 ${Math.round(H*.16)}px 'DM Mono',monospace`;
    const frac=countdown%1;
    ctx.fillStyle=`rgba(255,215,0,${frac<.5?frac*2:2-frac*2})`;
    ctx.shadowColor='rgba(255,215,0,.6)';ctx.shadowBlur=30;
    ctx.fillText(n>0?n:'GO!',W/2,H/2);
    ctx.restore();
  }
}

function drawIdle(){
  ctx.fillStyle='#07071A';ctx.fillRect(0,0,W,H);
  const t=performance.now()/1000;
  for(let i=0;i<7;i++){
    const ph=i*Math.PI/3.5;
    let a=.018+Math.sin(t*.6+ph)*.012;
    if(i===3) a*=2.2;
    ctx.fillStyle=`rgba(${LANE_RGB[i]},${a})`;
    ctx.fillRect(LX[i],0,LW,H);
    ctx.fillStyle=i===3?'rgba(255,215,0,.12)':'#1E1E4A';
    ctx.fillRect(LX[i],0,1,H);
  }
  ctx.fillStyle='#1E1E4A';ctx.fillRect(LX[6]+LW,0,1,H);
}

// ── GAME LOOP ──
function loop(ts){
  rafId=requestAnimationFrame(loop);
  const dt=Math.min((ts-lastTs)/1000,.05);lastTs=ts;
  if(STATE==='select'){drawIdle();return;}
  if(STATE==='playing'){
    if(countdown>0){countdown-=dt;drawPlay(dt);return;}
    scheduleAudio();checkMiss();
    if(gtime()>song.duration+1.2){endSong();return;}
    drawPlay(dt);updateHUD();
  }
}

// ── FLOW ──
function showSelect(){
  STATE='select';
  document.getElementById('scr-select').classList.remove('hidden');
  document.getElementById('scr-result').classList.add('hidden');
  document.getElementById('hud').classList.add('hidden');
  document.getElementById('prog').classList.add('hidden');
}

function startSong(s){
  song=s;
  chart=s.chart.map(n=>({...n,hit:false,miss:false}));
  drumEv=[...s.drums];audioEv=[...s.audio];
  score=0;combo=0;maxCombo=0;cnt={p:0,g:0,b:0,m:0};
  parts=[];flash=new Array(7).fill(0);kd=new Array(7).fill(false);
  judgeT=0;diPtr=0;daPtr=0;
  const WAIT=1.5;
  ac();
  audioOff=actx.currentTime+WAIT;
  gameOff=performance.now()+WAIT*1000;
  countdown=WAIT;
  STATE='playing';
  document.getElementById('scr-select').classList.add('hidden');
  document.getElementById('scr-result').classList.add('hidden');
  document.getElementById('hud').classList.remove('hidden');
  document.getElementById('prog').classList.remove('hidden');
  document.getElementById('hv-score').textContent='0';
  document.getElementById('hv-combo').textContent='0';
  document.getElementById('hv-acc').textContent='100.00%';
  document.getElementById('prog-fill').style.width='0%';
}

function endSong(){
  STATE='result';
  document.getElementById('hud').classList.add('hidden');
  document.getElementById('prog').classList.add('hidden');
  const tot=cnt.p+cnt.g+cnt.b+cnt.m,w=cnt.p+cnt.g*.65+cnt.b*.2;
  const acc=tot>0?w/tot*100:100;
  let grade,gc;
  if(acc>=98&&cnt.m===0){grade='S';gc='gS';}
  else if(acc>=90){grade='A';gc='gA';}
  else if(acc>=80){grade='B';gc='gB';}
  else if(acc>=65){grade='C';gc='gC';}
  else{grade='D';gc='gD';}
  document.getElementById('r-title').textContent=song.name;
  const gel=document.getElementById('r-grade');
  gel.textContent=grade;gel.className='rgrade '+gc;
  document.getElementById('rscore').textContent=Math.floor(score).toLocaleString();
  document.getElementById('r-p').textContent=cnt.p;
  document.getElementById('r-g').textContent=cnt.g;
  document.getElementById('r-b').textContent=cnt.b;
  document.getElementById('r-m').textContent=cnt.m;
  document.getElementById('r-c').textContent=maxCombo;
  document.getElementById('r-a').textContent=acc.toFixed(2)+'%';
  document.getElementById('scr-result').classList.remove('hidden');
}

// ── INPUT ──
const KMAP={s:0,d:1,f:2,' ':3,j:4,k:5,l:6};
document.addEventListener('keydown',e=>{
  if(STATE==='select') return;
  if(STATE==='result'){
    if(e.key==='Enter'||e.key===' '){e.preventDefault();startSong(song);}
    return;
  }
  const key=e.key===' '?' ':e.key.toLowerCase();
  const l=KMAP[key];
  if(l===undefined) return;
  e.preventDefault();
  if(!kd[l]){kd[l]=true;hitLane(l);}
});
document.addEventListener('keyup',e=>{
  const key=e.key===' '?' ':e.key.toLowerCase();
  const l=KMAP[key];
  if(l!==undefined) kd[l]=false;
});

// Touch (7 zones)
const wrap=document.getElementById('cv-wrap');
const touches={};
wrap.addEventListener('touchstart',e=>{
  e.preventDefault();
  if(STATE==='select') return;
  if(STATE==='result'){startSong(song);return;}
  [...e.changedTouches].forEach(touch=>{
    const rect=wrap.getBoundingClientRect();
    const x=touch.clientX-rect.left;
    for(let i=0;i<7;i++){
      if(x>=LX[i]&&x<LX[i]+LW){
        touches[touch.identifier]=i;kd[i]=true;hitLane(i);break;
      }
    }
  });
},{passive:false});
wrap.addEventListener('touchend',e=>{
  e.preventDefault();
  [...e.changedTouches].forEach(touch=>{
    const l=touches[touch.identifier];
    if(l!==undefined){kd[l]=false;delete touches[touch.identifier];}
  });
},{passive:false});

document.getElementById('btn-retry').addEventListener('click',()=>startSong(song));
document.getElementById('btn-sel').addEventListener('click',showSelect);

// ── SONG LIST UI ──
function renderSongList(filter){
  const list=document.getElementById('song-list');
  list.innerHTML='';
  SONGS.forEach(s=>{
    if(filter&&filter!=='ALL'&&s.diff!==filter) return;
    const card=document.createElement('div');
    card.className='song-card';
    const dc=s.diff==='EASY'?'d-easy':s.diff==='MEDIUM'?'d-mid':'d-hard';
    card.innerHTML=`<div><div class="song-name">${s.name}</div><span class="diff ${dc}">${s.diff}</span></div><div class="song-bpm">${s.bpm} BPM</div>`;
    card.addEventListener('click',()=>startSong(s));
    list.appendChild(card);
  });
}

document.querySelectorAll('.dtab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.dtab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    renderSongList(tab.dataset.d);
  });
});

// ── BOOT ──
resize();
renderSongList('ALL');
lastTs=performance.now();
requestAnimationFrame(loop);
</script>
</body>
</html>
